name: flyway-version-check

# Scheduled / manual only. Forks cannot trigger these, so the write-scoped token
# below never runs against fork-supplied code. NEVER add pull_request /
# pull_request_target, and never actions/checkout a PR ref in this workflow.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  missing-versions:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.missing.outputs.has_new }}
      versions: ${{ steps.missing.outputs.versions }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Compute missing Flyway versions
        id: missing
        run: |
          versions="$(.github/scripts/flyway-missing-versions.sh)"
          versions_json="$(printf '%s\n' "$versions" | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          echo "versions=${versions_json}" >> "$GITHUB_OUTPUT"
          if [ -n "$versions" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: missing-versions
    if: needs.missing-versions.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flyway: ${{ fromJSON(needs.missing-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'zulu'
          java-version: '25.0.3'

      - name: Test with Flyway ${{ matrix.flyway }}
        run: ./gradlew test -PflywayVersion=${{ matrix.flyway }}

  open-pull-request:
    needs: [missing-versions, validate]
    if: needs.missing-versions.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Add versions to the data file
        # Edits the data file (.github/flyway-versions.json), NOT the workflow
        # file, so the default GITHUB_TOKEN can push the change — it cannot push
        # edits to .github/workflows/*. jq's default pretty output matches the
        # seeded format, keeping the PR diff to the added line(s).
        run: |
          jq -r '.[]' <<< '${{ needs.missing-versions.outputs.versions }}' | while IFS= read -r v; do
            tmp="$(mktemp)"
            jq --arg v "$v" '. + [$v]' .github/flyway-versions.json > "$tmp"
            mv "$tmp" .github/flyway-versions.json
          done

      - name: Open / update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # Set FLYWAY_VERSION_CHECK_TOKEN to a PAT or GitHub App token if this
          # repo disables PR creation by the default Actions token.
          token: ${{ secrets.FLYWAY_VERSION_CHECK_TOKEN || github.token }}
          branch: chore/flyway-versions
          base: main
          title: 'ci: add new Flyway version(s) to the compatibility matrix'
          commit-message: 'ci: add new Flyway version(s) to the compatibility matrix'
          labels: dependencies
          body: |
            Automated by the daily `flyway-version-check` workflow.

            New Flyway version(s) added to `.github/flyway-versions.json` (the
            source of the CI compatibility matrix).

            Validated by the matrix jobs in ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.
