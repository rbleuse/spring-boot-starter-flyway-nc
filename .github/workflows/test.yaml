name: test

on:
  push:
    branches: [ main ]
  pull_request:

# Least privilege by default. Jobs that run PR-supplied code (test, compatibility)
# inherit read-only and get no secrets; only the push-only dependency-graph job is
# granted write. NEVER switch any of these to pull_request_target.
permissions:
  contents: read

jobs:
  base-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 'Dependency Review'
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'zulu'
          java-version: '25.0.3'
      - name: Read configured Flyway version
        id: flyway_version
        uses: ./.github/actions/resolve-flyway-version
      - name: Test with configured Flyway ${{ steps.flyway_version.outputs.version }}
        run: ./gradlew lintKotlin test

  flyway-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: read
        # Reads the compatibility version list (single source of truth, edited by
        # the flyway-version-check cron) into a JSON matrix value. Kept in a data
        # file rather than inline in this workflow so the cron can update it with
        # the default GITHUB_TOKEN, which cannot push changes to .github/workflows/*.
        run: echo "versions=$(jq -c . .github/flyway-versions.json)" >> "$GITHUB_OUTPUT"

  flyway-version-compatibility:
    needs: flyway-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flyway: ${{ fromJSON(needs.flyway-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'zulu'
          java-version: '25.0.3'
      - name: Read configured Flyway version
        id: flyway_version
        uses: ./.github/actions/resolve-flyway-version
        with:
          flyway-version: ${{ matrix.flyway }}
      - name: Test with configured Flyway ${{ steps.flyway_version.outputs.version }}
        run: ./gradlew test -PflywayVersion=${{ matrix.flyway }}

  test:
    if: always()
    needs: [base-version, flyway-version-compatibility ]
    runs-on: ubuntu-latest
    steps:
      - if: needs.base-version.result != 'success' || needs.flyway-version-compatibility.result != 'success'
        run: |
          echo "base-version result: ${{ needs.base-version.result }}"
          echo "flyway-version-compatibility matrix result: ${{ needs.flyway-version-compatibility.result }}"
          exit 1

  dependency-graph:
    # Only on push to the base repo (never fork PRs) so the write-scoped token
    # never runs against PR-supplied code.
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'zulu'
          java-version: '25.0.3'
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          dependency-graph: generate-and-submit
        env:
          # Exclude the Kotlin Gradle Plugin's internal Bouncy Castle configuration from the
          # submitted dependency graph. It is used only for publishing-signature validation at
          # build time (not compiled, not on runtime/test classpaths, not in any published
          # artifact), so its bundled bcprov-jdk18on is not exploitable here. Excluding it keeps
          # build-only deps out of Dependabot alerts (e.g. the FrodoEngine timing-channel CVE).
          DEPENDENCY_GRAPH_EXCLUDE_CONFIGURATIONS: kotlinBouncyCastleConfiguration
