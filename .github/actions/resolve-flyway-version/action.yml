name: Resolve Flyway version
description: Select the Flyway version configured for the build

inputs:
  flyway-version:
    description: Optional Flyway version override passed to Gradle
    required: false
    default: ''

outputs:
  version:
    description: Flyway version configured for the build
    value: ${{ steps.resolve.outputs.version }}

runs:
  using: composite
  steps:
    - name: Resolve version
      id: resolve
      shell: bash
      env:
        FLYWAY_VERSION: ${{ inputs.flyway-version }}
        VERSION_RESOLVER: ${{ github.action_path }}/resolve-version.sh
        PROPERTIES_FILE: ${{ github.workspace }}/gradle.properties
      run: |
        version="$(bash "$VERSION_RESOLVER" "$FLYWAY_VERSION" "$PROPERTIES_FILE")"
        echo "version=$version" >> "$GITHUB_OUTPUT"
